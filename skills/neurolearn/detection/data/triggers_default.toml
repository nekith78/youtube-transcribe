# Built-in triggers shipped with neurolearn v0.2.
# DO NOT edit this file. User overrides go to ~/.neurolearn/triggers.toml.

default_language = "en"
universal_match_method = "semantic"
universal_match_threshold = 0.65

[triggers.universal]
phrases = [
  "look here",
  "pay attention",
  "see this code",
  "this is important",
  "for example",
  "step by step",
  "demonstrate",
  "result",
  "diagram",
  "notice this",
  "key point",
  "remember this",
  "important note",
  "watch closely",
  "the trick is",
  "the catch is",
  "this part",
  "see the difference",
  "this is how",
  "let me show you",
  "right here",
  "as you can see",
  "the result is",
  "compare these",
  "before and after",
]
