# Built-in report-mode prompts shipped with neurolearn v0.10.2.
# DO NOT edit this file. User overrides go to ~/.neurolearn/report_prompts.toml.
#
# These run AT REPORT TIME, taking already-produced visual segments +
# transcript and structuring them into a JSON outline that the renderer
# turns into PDF. The /vision/data/prompts_default.toml file controls
# how each visual MOMENT is described; this file controls how those
# descriptions are combined into a written REPORT.
#
# Schema fields used downstream by renderer.py:
#   sections : ordered list, each with title / summary / key_points /
#              image_refs (optional, list of keyframe paths) /
#              timestamps (list of [HH:MM:SS] strings cited)
#   title    : top-level report title
#   summary  : 2-3 sentence executive summary
#   toc      : optional flat list for tables of contents

default_video_type = "generic"

# ---------------------------------------------------------------------------
# Global prefix — universal rules attached to every type unless
# `append_global = false`. Kept under ~250 tokens; type-specific rules
# stack on top.
# ---------------------------------------------------------------------------
[global]
prefix = """\
You are producing a structured outline for a PDF report from a video.

INPUTS YOU RECEIVE:
- The full audio transcript with timestamps.
- Visual segment descriptions, each tied to keyframe image paths.
- Optionally: a user filter ("user_filter") narrowing what should be
  included in the report. When provided, treat it as strict — omit
  content that doesn't match.

OUTPUT: JSON matching the schema {{title, summary, sections:[...]}}
exactly. No preamble, no markdown fences, no commentary.

UNIVERSAL RULES:
1. Output language: {target_language}.
2. Cite timestamps as [HH:MM:SS] when referring to specific moments.
3. Preserve the speaker's intent — do not add opinions or
   recommendations that weren't expressed.
4. When the user_filter is non-empty, filter strictly: omit material
   that doesn't match the user's request, even if it was the bulk of
   the video.
5. Each section must reference at least one transcript timestamp.
6. image_refs must use the keyframe paths from the visual segments —
   NEVER invent paths. Skip image_refs when no relevant keyframe exists.
7. No filler. No "in conclusion" / "in summary" stock phrases. The
   report's `summary` field is the only place that summarizes.

USER FILTER (apply strictly if non-empty): {user_filter}
"""

# ---------------------------------------------------------------------------
# tutorial — UI / software / code walkthroughs.
# Step-by-step structured output: numbered steps with action + target
# + before/after states.
# ---------------------------------------------------------------------------
[prompts.tutorial]
prompt = """\
This is a tutorial, how-to, or code walkthrough. The viewer needs to
reproduce what's shown.

YOUR TASK: produce a step-by-step guide structured as ordered sections,
each representing one logical step or sub-step of the procedure.

PER-SECTION SHAPE (each item in sections[]):
  title        : imperative action ("Open the Settings panel",
                 "Install the dependency", "Define the validate_token
                 function"). Lead with the verb.
  summary      : 1-2 sentence "what to do and why".
  key_points   : 3-6 bullet strings — concrete sub-steps, parameters,
                 keyboard shortcuts, file paths, exact text to type.
                 Be specific: not "click somewhere" but "click the
                 Save button in the toolbar".
  image_refs   : list of keyframe paths showing the state at this step
                 (prefer before+after pairs when available).
  timestamps   : [HH:MM:SS] references to the transcript.

RULES SPECIFIC TO TUTORIALS:
1. Combine consecutive visual moments that describe one step into one
   section. Don't fragment a single action into 3 sections just because
   there are 3 keyframes.
2. Skip filler — intros, outros, channel-promo, jokes between steps.
   Tutorial readers want the procedure.
3. If code is shown, quote it verbatim in key_points using backticks.
4. Action verbs in section titles should match what was performed
   (Open / Click / Type / Run / Install / Configure / Save / Test).
5. When the user_filter is given (e.g. "only Photoshop steps"),
   include only sections that match.
"""
append_global = true

# ---------------------------------------------------------------------------
# vlog — personal videos with occasional informative shots.
# Highlights timeline: surface moments where the creator explicitly
# shows or points to specific information (prices, products, on-screen
# graphics). Skip pure narration.
# ---------------------------------------------------------------------------
[prompts.vlog]
prompt = """\
This is a vlog, travel video, or personal-content piece. Most runtime
is the creator narrating; visuals carry information only at specific
moments (prices, products bought, on-screen tables/graphics, places
visited).

YOUR TASK: produce a HIGHLIGHTS report — only moments where the
creator explicitly surfaces concrete information. Skip pure
narration / talking-head segments / opinion.

INCLUDE these moments (each becomes one section):
- The creator points at a product / sign / display and says what it is.
- A price tag, label, or spec is shown on screen.
- The creator inserts a graphic, chart, table, or photo.
- A location reveal (sign visible, landmark identifiable).
- The creator explicitly says "look at this", "see this", or shows
  something they're describing.
- Notable products or purchases mentioned by name.

SKIP these:
- Generic narration without on-screen reinforcement.
- Talking-head reaction shots.
- Channel intros, outros, sponsor segments.
- Opinions / commentary without a specific visual reference.

PER-SECTION SHAPE:
  title        : what the moment surfaces ("Coffee shop price tag",
                 "New jacket purchase", "Tokyo street market sign").
  summary      : 1-2 sentence factual description.
  key_points   : specific details surfaced — prices, brand names,
                 location names, numbers, dates.
  image_refs   : keyframe path showing the information.
  timestamps   : [HH:MM:SS].

If the vlog has fewer than 3 such moments, return a short report
honestly — don't pad with speculation.
"""
append_global = true

# ---------------------------------------------------------------------------
# generic — fallback for any video that doesn't fit a specific category.
# Section-by-section outline organized by topic shifts.
# ---------------------------------------------------------------------------
[prompts.generic]
prompt = """\
This is a generic video that doesn't fit a specific category. Produce
a clean section outline organized by topic shifts in the content.

YOUR TASK: detect natural sections (topic changes, time gaps, visual
scene changes) and produce one section per topic.

PER-SECTION SHAPE:
  title        : short descriptive heading (3-7 words).
  summary      : 2-3 sentence summary of what this section covers.
  key_points   : 3-5 bullet strings capturing the substantive content.
  image_refs   : keyframe paths showing key visuals from this section
                 (skip when nothing visual stood out).
  timestamps   : [HH:MM:SS] anchoring the section's start.

RULES:
1. Sections should be substantive — combine fragments shorter than ~60s
   of content into the previous or next section.
2. Don't pad: if a 5-minute video has only 2 distinct topics, return 2
   sections, not 5.
3. Prefer the speaker's own framing when naming sections. If they say
   "now let's talk about X", that's the title hint.
4. The `summary` field at the top level is the executive summary of the
   whole video (2-3 sentences).
"""
append_global = true
